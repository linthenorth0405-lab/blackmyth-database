<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>黑神話天堂｜怪物掉落圖鑑</title>
<meta name="description" content="黑神話天堂怪物掉落資料庫，可依怪物、物品名稱與編號搜尋。">
<style>

:root{--bg:#0b0d0d;--panel:#141817;--panel2:#1b211f;--line:#3b443e;--gold:#c7a96b;--gold2:#f0d69a;--text:#eee8dc;--muted:#aaa79d;--danger:#d88b79;--green:#80aa8b;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--text);font-family:"Noto Serif TC","Microsoft JhengHei",serif;background:radial-gradient(circle at 15% 0%,rgba(126,104,59,.15),transparent 28%),radial-gradient(circle at 90% 12%,rgba(70,103,84,.13),transparent 25%),linear-gradient(180deg,#111513 0,#090b0b 55%,#070909 100%);min-height:100vh}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.18;background-image:repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.018) 4px)}
a{color:inherit}.wrap{width:min(1480px,calc(100% - 32px));margin:auto}.hero{padding:58px 0 28px;text-align:center}.eyebrow{letter-spacing:.35em;color:var(--gold);font-size:12px}.hero h1{margin:12px 0 8px;font-size:clamp(34px,5vw,68px);font-weight:800;letter-spacing:.08em;text-shadow:0 4px 30px rgba(0,0,0,.6)}.hero p{max-width:760px;margin:0 auto;color:var(--muted);line-height:1.9}.ornament{display:flex;align-items:center;gap:16px;justify-content:center;margin:20px auto;width:min(520px,80%);color:var(--gold)}.ornament:before,.ornament:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:10px auto 26px;max-width:920px}.stat{border:1px solid rgba(199,169,107,.26);background:linear-gradient(180deg,rgba(32,38,35,.88),rgba(18,22,21,.88));padding:15px 10px;box-shadow:var(--shadow)}.stat b{display:block;color:var(--gold2);font-size:25px}.stat span{font-size:12px;color:var(--muted);letter-spacing:.12em}
.toolbar{position:sticky;top:0;z-index:10;padding:14px 0;background:linear-gradient(180deg,rgba(9,11,11,.98),rgba(9,11,11,.88));backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(199,169,107,.2)}.toolbar-inner{display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:14px;align-items:center}.search{display:flex;align-items:center;background:#111514;border:1px solid var(--line);min-height:48px}.search span{padding:0 14px;color:var(--gold)}.search input{width:100%;border:0;outline:0;background:transparent;color:var(--text);padding:13px 14px 13px 0;font-size:16px}.search input::placeholder{color:#777d78}.filters{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}.filter{border:1px solid var(--line);background:#121615;color:var(--muted);padding:9px 13px;cursor:pointer;font:inherit;transition:.18s}.filter:hover,.filter.active{border-color:var(--gold);color:var(--gold2);background:rgba(199,169,107,.1)}
.resultbar{display:flex;justify-content:space-between;align-items:center;padding:22px 0 12px;color:var(--muted);font-size:14px}.resultbar strong{color:var(--gold2)}.sort select{background:#121615;border:1px solid var(--line);color:var(--text);padding:8px 11px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;padding-bottom:30px}.card{border:1px solid var(--line);background:linear-gradient(145deg,rgba(27,33,31,.97),rgba(15,18,17,.98));box-shadow:var(--shadow);overflow:hidden;transition:.2s}.card:hover{transform:translateY(-2px);border-color:rgba(199,169,107,.55)}.card-head{padding:17px 18px 13px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.mob-name{font-size:20px;font-weight:800;color:#f4ecdd}.mob-id{font-size:11px;color:#7f8781;margin-top:5px}.drop-count{white-space:nowrap;color:var(--gold);font-size:12px;border:1px solid rgba(199,169,107,.3);padding:5px 8px}.drops{max-height:338px;overflow:auto}.drop{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.045)}.drop:last-child{border-bottom:0}.item{font-size:14px;line-height:1.45}.item-id{font-size:10px;color:#707771}.meta{text-align:right;font-size:12px;color:var(--muted)}.chance{display:block;color:var(--green);font-weight:700}.chance.rare{color:var(--danger)}.qty{font-size:10px}.badge{display:inline-block;margin-left:6px;padding:2px 5px;border:1px solid rgba(255,255,255,.12);color:#969e98;font-size:9px;vertical-align:1px}.empty{grid-column:1/-1;text-align:center;padding:70px 20px;border:1px dashed var(--line);color:var(--muted)}
.pagination{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;padding:12px 0 52px}.page-btn{min-width:39px;height:39px;padding:0 10px;border:1px solid var(--line);background:#121615;color:var(--muted);cursor:pointer}.page-btn:hover,.page-btn.active{border-color:var(--gold);color:var(--gold2)}.page-btn:disabled{opacity:.35;cursor:not-allowed}.foot{border-top:1px solid rgba(199,169,107,.18);color:#777d78;padding:26px 0 42px;text-align:center;font-size:12px;line-height:1.8}.top{position:fixed;right:18px;bottom:18px;width:44px;height:44px;border:1px solid var(--gold);background:rgba(18,22,21,.92);color:var(--gold2);cursor:pointer;display:none}
mark{background:rgba(199,169,107,.28);color:#fff0c9;padding:0 1px}
@media(max-width:1050px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.toolbar-inner{grid-template-columns:1fr}.filters{justify-content:flex-start}}
@media(max-width:680px){.wrap{width:min(100% - 20px,1480px)}.hero{padding-top:35px}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.resultbar{align-items:flex-start;gap:12px;flex-direction:column}.card{box-shadow:none}.drops{max-height:420px}.filter{padding:8px 10px;font-size:13px}}
@media print{.toolbar,.pagination,.top{display:none!important}.grid{grid-template-columns:1fr}.drops{max-height:none}.card{break-inside:avoid}}

.site-nav{position:sticky;top:0;z-index:30;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:10px;background:rgba(7,9,9,.96);border-bottom:1px solid rgba(199,169,107,.28);backdrop-filter:blur(10px)}.site-nav a{color:#d8c28d;text-decoration:none;border:1px solid var(--line);padding:8px 14px;background:#121615}.site-nav a:hover,.site-nav a.active{border-color:var(--gold);color:#fff0c5}


/* 精簡顯示：不顯示統計、掉落機率與 ITEM ID */
.stats,
.item-id,
.chance {
  display: none !important;
}
.drop {
  align-items: center;
}
.meta {
  min-width: 66px;
}
.qty {
  display: inline-block;
  padding: 4px 8px;
  border: 1px solid rgba(199,169,107,.22);
  color: #d7c08c;
  background: rgba(199,169,107,.06);
  font-size: 11px;
}

</style>
</head>
<body>
<nav class="site-nav">
  <a href="../">首頁</a>
  <a href="../boss/">BOSS 看板</a>
  <a class="active" href="./">怪物掉落</a>
  <a href="../cardbook/">卡冊查詢</a>
</nav>
<header class="hero wrap">
  <div class="eyebrow">BLACK MYTH LINEAGE</div>
  <h1>怪物掉落圖鑑</h1>
  <div class="ornament">◆</div>
  <p>可搜尋怪物名稱或掉落物名稱，並依物品類型快速篩選。</p>
</header>
<nav class="toolbar">
 <div class="wrap toolbar-inner">
  <label class="search"><span>⌕</span><input id="q" autocomplete="off" placeholder="搜尋怪物或掉落物，例如：銀長劍"></label>
  <div class="filters" id="filters">
   <button class="filter active" data-filter="全部">全部</button>
   <button class="filter" data-filter="裝備">裝備</button>
   <button class="filter" data-filter="消耗品">消耗品</button>
   <button class="filter" data-filter="材料">材料</button>
   <button class="filter" data-filter="貨幣">貨幣</button>
   <button class="filter" data-filter="其他">其他</button>
  </div>
 </div>
</nav>
<main class="wrap">
 <div class="resultbar"><div id="summary"></div><label class="sort">排序　<select id="sort"><option value="name">怪物名稱</option><option value="drops">掉落數量</option><option value="id">怪物 ID</option></select></label></div>
 <section class="grid" id="grid"></section>
 <div class="pagination" id="pagination"></div>
</main>
<footer class="foot wrap">黑神話天堂資料圖鑑 · 資料來源：droplist.xls<br>分類由物品名稱自動辨識，實際設定仍以遊戲內資料為準。</footer>
<button class="top" id="top" aria-label="回到頂端">↑</button>
<script src="../js/monster.js?v=2"></script>
</body>
</html>
