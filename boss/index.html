*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:"Noto Serif TC","Microsoft JhengHei",serif;background:radial-gradient(circle at 12% 0%,rgba(126,104,59,.18),transparent 30%),linear-gradient(180deg,#111513,#080a09);min-height:100vh}.wrap{width:min(1180px,calc(100% - 24px));margin:auto}.nav{position:sticky;top:0;z-index:20;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:10px;background:rgba(7,9,9,.95);border-bottom:1px solid rgba(199,169,107,.28);backdrop-filter:blur(10px)}.nav a{color:#d8c28d;text-decoration:none;border:1px solid var(--line);padding:8px 14px;background:#121615}.nav a:hover,.nav a.active{border-color:var(--gold);color:#fff0c5}.hero{text-align:center;padding:55px 0 32px}.eyebrow{color:var(--gold);letter-spacing:.32em;font-size:12px}.hero h1{margin:12px 0 8px;font-size:clamp(34px,6vw,64px);letter-spacing:.08em}.hero p{color:var(--muted);line-height:1.8}.panel{border:1px solid var(--line);background:linear-gradient(145deg,rgba(28,33,31,.97),rgba(14,17,16,.97));box-shadow:0 18px 48px rgba(0,0,0,.35)}.footer{text-align:center;color:#707670;padding:35px 0;font-size:12px}@media(max-width:600px){.nav a{padding:7px 9px;font-size:12px}.hero{padding-top:38px}}
