<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>黑神話天堂｜BOSS 即時看板</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="../">首頁</a>
    <a class="active" href="./">BOSS 看板</a>
    <a href="../weapon/">武器圖鑑</a>
    <a href="../monster/">怪物掉落</a>
    <a href="../cardbook/">卡冊查詢</a>
  </nav>

  <header class="hero wrap">
    <div class="eyebrow">WORLD BOSS</div>
    <h1>BOSS 即時看板</h1>
    <p>BOSS 出生後會顯示「已出生」；玩家擊殺後，伺服器更新下一次出生時間才重新倒數。</p>
  </header>

  <main class="wrap">
    <div class="tools">
      <input id="bossSearch" type="search" placeholder="搜尋 BOSS 名稱">
      <select id="bossFilter">
        <option value="all">全部狀態</option>
        <option value="born">已出生</option>
        <option value="future">倒數中</option>
      </select>
    </div>

    <section id="nextBoss" class="panel lead"></section>
    <section id="bossGrid" class="grid"></section>
  </main>

  <footer class="footer">目前為靜態資料版；接上伺服器 API 後可自動同步。</footer>

<script src="../js/boss.js?v=2"></script>
</body>
</html>
